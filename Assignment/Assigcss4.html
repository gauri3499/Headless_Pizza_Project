<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipcart Login Page</title>
    <style>
        body{
            margin:0;
            font-family: Arial ;
        }
        .grid-container{
        border:1px solid black;
        min-height: 100vh;
        display: flex;
    }
    
    .grid1{
        background-color: rgb(116, 116, 245);
        width:50%;
        display: flex;
        
        

    }
    h2{
        align-items: flex-start;
    }
    p{
        
        align-items: center;
        
    }
    .grid2{
        background-color: rgb(188, 187, 187);
        width: 50%;
        
    }

    </style>
</head>
<body>
    <div class="grid-container">
        <div class="grid1">
            <h2>Login</h2>


            <p>Get acess to your orders,
            Wishlist and Recommendations</p>
        </div>
        <div class="grid2">
            <input type="text" placeholder="Enter Email/Mobile number"> 
            <p>By continuing, you agree to Flipkart's <main>Terms of use </main> and <main>Privacy Policy</main></p>

            <button>Request OTP</button>
        </div>
    </div>
    

     
</body>
</html>
