<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
    <style>
        .grid-container{

            display: grid;
            grid-template-columns: repeat(3,20px);
            /* grid-template-columns: 1fr 2fr 1fr; */
            /* grid-template-columns: 20px 20px 20px;*/
            grid-template-rows:repeat(2,20px,30px);
            gap: 10;
        }
        .grid-item{
            background-color:1px solid black;
            font-size: 40px;
        }
        .one{
            background-color: aqua;
            grid-column-start: 1;
            grid-column-end: 3;
        }
        .two{
            background-color: brown;
            /* grid-column-start: 3;
            grid-column-end:6 ; */
            grid-column: 3/6;
        }
        .three{
            background-color: aquamarine;
            /* grid-row-start: 2;
            grid-row-end: 6; */
            grid-row:2/6;
        }
        .four{
            background-color: chocolate;
            /* grid-column: 2/5;
            grid-row: 2/5; 
            row start/column start/row end/column end*/
            grid-area:2/2/5/5;
        }
        .five{
            background-color: cornflowerblue;
            grid-row:2/5;
        }
        .six{
            background-color: blue;
            grid-column: 2/6;
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="grid-item one ">1</div>
        <div class="grid-item two ">2</div>
        <div class="grid-item three ">3</div>
        <div class="grid-item four ">4</div>
        <div class="grid-item five ">5</div>
        <div class="grid-item six">6</div>
    </div>
</body>
</html>
