<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            background-color: yellow;

        }
        div::first-letter{
            font-size:40px;
        }
        p{
            background-color: blue;
            height:100px;
            width:100px;

        }
        p:hover{
            height:200px;
            width:200px;

        }
    </style>
</head>
<body>
    <div>
        i like home</div>
</body>
</html>
<!-- psedo class :based on state/specific state
                 --(single colon:)
                 --whole part
                 ex: :hover, :focus :active :visited :link :frist-child
    pseudo element : based on specific part of an element
                    --double colon ::
                    -- part of an element 
                    
                    
                   
                                                        -->
