<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table,th,td{
            border:1px soild black;
            border-collapse: collapse;
            padding: 10px;
        }
        table{
            height: 10px;
            width: 10px;

        }

    </style>
</head>
<body>
    <table border="1" cellpadding="10" cellspacing="10">
        <thead>
            <tr>
                <th>SLNO</th>
                <th>Name</th>
                <th>PHONE</th>
            </tr>
            
        </thead>
        <tbody>
            <td>1</td>
            <td>gauri</td>
            <td>1236547890</td>
        </tbody>
    </table>
    
</body>
</html>

<!-- 
table --for table structure
thead --for table head
tbody --for table data/body
tr    --for table row
th    --for table header cell(bold and centered)
td    --fortable data 
cellspacing -- space betweem cell to cell
cellpadding --space between cell content and border-->
