<body>
    <script>
        // 1.pending  2.Fulfilled / sucess 3. feailured/rejected
        let res= fetch("https://jsonplaceholder.typicode.com/users");
        console.log(res);//then and catch


        // Handling a promise through then and 
        res 
        .then((response)=>{
            console.log(response.json());
            response.json();//promises
        })
        .then((users)=>{
            console.log(users);
        })

        // })

        async function fetchData() {
            let res=await fetch("https://jsonplaceholder.typicode.com/users");
            let users=await res.json();
            console.log(users);
            
        }
        fetchData();
    </script>
