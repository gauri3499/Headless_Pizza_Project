<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Looping Statements </title>
</head>
<body>
    <script>
        // if(true){
        //     console.log("Hello world")
        // }

        console.log("for loop ")
        for(let x=1;x<=5;x++){
            console.log(x);
        }
        
         console.log("While loop ")
        while(true){

            console.log("Hello world")

        }
        let a=10;//declaring and assiging
        while(a<=20){
            console.log(a);
            a++;//update/re-assigning
        }

    console.log("do while loop")
    let b=5;
    do{
        console.log(b)
        b++;
    }
    while(b<=7) 
    </script>
</body>
</html>
