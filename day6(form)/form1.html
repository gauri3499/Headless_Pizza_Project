<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    
    <form action="" method="post">
        <label for="age">Age</label> 
        <input type="number" name="age" id="age" placeholder="Enter your age ">

        <label for="name">Name</label>
        <input type="text" name="name" id="name" placeholder="Enter your name ">
        
        <button type="reset">Reset</button>
        <button type="submit">Submit</button>

    </form>
</body>
</html>

<!-- 

    action : where the data is sent (backend)
    method : how data is sent to backend
            1.get --- we can display the data in the format of key and value pair
            2.post --- we can hide the data in url
            
    name : 
    <form action="https://httpbin.org/post" method="post">  
    <form action=" " method="post">  
    <from action="" method="get"> : only you can write only action by default it is using get method
                                  : it is called query string or query parameter
    for and id  : it high light the box
    placeholder : it can be used for what the enter you can write their-->
